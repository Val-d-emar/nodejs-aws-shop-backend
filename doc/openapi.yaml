openapi: 3.0.0
info:
  title: AWS Shop Unified API Gateway (BFF)
  description: Consolidated API documentation for Product, Cart, Order, and Import services routed via BFF Gateway.
  version: 1.0.0
servers:
  - url: https://d2azifyt8opqc6.cloudfront.net
    description: Production BFF Gateway (CloudFront HTTPS)
paths:
  # ==========================================
  # PRODUCT SERVICE ENDPOINTS (routed via /product)
  # ==========================================
  /product/products:
    get:
      summary: Get all available products (Cached for 2 min)
      responses:
        "200":
          description: List of products with stock counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductWithStock"
    post:
      summary: Create a new product (Admin only)
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created successfully
        "400":
          description: Invalid input data
        "401":
          description: Unauthorized
  /product/products/{productId}:
    get:
      summary: Get product details by ID
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductWithStock"
        "404":
          description: Product not found
    delete:
      summary: Delete product from catalog (Admin only)
      security:
        - BasicAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product deleted successfully
        "401":
          description: Unauthorized
        "404":
          description: Product not found

  # ==========================================
  # CART & CHECKOUT SERVICE ENDPOINTS (routed via /cart)
  # ==========================================
  /cart/api/profile/cart:
    get:
      summary: Get active user shopping cart
      security:
        - BasicAuth: []
      responses:
        "200":
          description: Cart details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartItem"
        "401":
          description: Unauthorized
    put:
      summary: Add or update item in cart
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutCartRequest"
      responses:
        "200":
          description: Updated cart items list
        "401":
          description: Unauthorized
    delete:
      summary: Clear active user cart
      security:
        - BasicAuth: []
      responses:
        "200":
          description: Cart cleared successfully
        "401":
          description: Unauthorized

  /cart/api/profile/cart/order:
    get:
      summary: Get all checkout orders (Admin only)
      security:
        - BasicAuth: []
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderResponse"
        "401":
          description: Unauthorized
    put:
      summary: Checkout active cart and create an order (Transaction-based)
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, total]
              properties:
                address: { type: string, example: "Test Street 123" }
                total: { type: number, example: 283 }
      responses:
        "200":
          description: Order created successfully
        "400":
          description: Cart is empty or invalid data
        "401":
          description: Unauthorized

  /cart/api/profile/cart/order/{id}:
    get:
      summary: Get single order details (Admin only)
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
        "401":
          description: Unauthorized
        "404":
          description: Order not found
    delete:
      summary: Delete order from database (Admin only)
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order deleted successfully
        "401":
          description: Unauthorized

  /cart/api/profile/cart/order/{id}/status:
    put:
      summary: Update order status (Admin only)
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, example: "APPROVED" }
                comment: { type: string, example: "Shipped via DHL" }
      responses:
        "200":
          description: Order status updated
        "401":
          description: Unauthorized

  # ==========================================
  # IMPORT SERVICE ENDPOINTS (routed via /import)
  # ==========================================
  /import/import:
    get:
      summary: Get a signed URL for CSV file upload
      security:
        - BasicAuth: []
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A signed URL for uploading the file to S3
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Unauthorized

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    ProductWithStock:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        price: { type: number }
        count: { type: number }
        image: { type: string }
    CreateProductRequest:
      type: object
      required: [title, description, price, count]
      properties:
        title: { type: string }
        description: { type: string }
        price: { type: number }
        count: { type: number }
        image: { type: string }
    CartItem:
      type: object
      properties:
        product:
          $ref: "#/components/schemas/ProductWithStock"
        count:
          type: number
    PutCartRequest:
      type: object
      required: [product, count]
      properties:
        product:
          type: object
          required: [id]
          properties:
            id: { type: string, format: uuid }
        count:
          type: number
    OrderResponse:
      type: object
      properties:
        order:
          type: object
          properties:
            id: { type: string, format: uuid }
            userId: { type: string, format: uuid }
            cartId: { type: string, format: uuid }
            payment: { type: object }
            delivery: { type: object }
            comments: { type: string }
            status: { type: string }
            total: { type: number }
